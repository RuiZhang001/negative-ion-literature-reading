    const papers = [...curatedPapers, ...extractedPapers]
      .filter((paper, index, allPapers) => {
        const key = paper.title.toLowerCase().replace(/[^a-z0-9]+/g, " ").trim();
        return key && allPapers.findIndex((item) => item.title.toLowerCase().replace(/[^a-z0-9]+/g, " ").trim() === key) === index;
      });

    const topicLabels = {
      pes: "负离子光电子能谱",
      dynamics: "反应动力学",
      spectroscopy: "谱学与成键"
    };

    const searchInput = document.querySelector(".search");
    const groupSelect = document.querySelector(".group-select");
    const buttons = Array.from(document.querySelectorAll(".segment"));
    const grid = document.querySelector("#paperGrid");
    const emptyState = document.querySelector("#emptyState");
    const countPill = document.querySelector("#countPill");
    let activeTopic = "all";

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderGroupOptions() {
      const preferredOrder = [
        "Chuangang Ning",
        "Daniel M. Neumark",
        "Lai-Sheng Wang",
        "Xue-Bin Wang",
        "Kit H. Bowen",
        "Roland Wester",
        "Xueming Yang",
        "Dong H. Zhang",
        "Mingfei Zhou",
        "Wei-Jun Zheng",
        "其他课题组"
      ];
      const paperGroups = [...new Set(papers.map((paper) => paper.group))];
      const groups = [
        ...preferredOrder.filter((group) => paperGroups.includes(group)),
        ...paperGroups.filter((group) => !preferredOrder.includes(group)).sort()
      ];
      groupSelect.insertAdjacentHTML(
        "beforeend",
        groups.map((group) => `<option value="${escapeHtml(group)}">${escapeHtml(group)}</option>`).join("")
      );
    }

    function paperText(paper) {
      return [
        paper.group,
        paper.institution,
        topicLabels[paper.topic],
        paper.title,
        paper.titleCn,
        paper.authors,
        paper.year,
        paper.venue,
        paper.en,
        paper.cn
      ].join(" ").toLowerCase();
    }

    function renderPapers() {
      const query = searchInput.value.trim().toLowerCase();
      const group = groupSelect.value;
      const filtered = papers.filter((paper) => {
        const topicMatch = activeTopic === "all" || paper.topic === activeTopic;
        const groupMatch = group === "all" || paper.group === group;
        const textMatch = !query || paperText(paper).includes(query);
        return topicMatch && groupMatch && textMatch;
      }).sort((left, right) => right.year - left.year || left.title.localeCompare(right.title));

      grid.innerHTML = filtered.map((paper) => `
        <article class="paper">
          <div class="paper-top">
            <div class="tag-row">
              <span class="topic ${paper.topic}">${escapeHtml(topicLabels[paper.topic])}</span>
              <span class="group-tag">${escapeHtml(paper.group)}</span>
            </div>
            <h2>${escapeHtml(paper.title)}</h2>
            <p class="title-cn">${escapeHtml(paper.titleCn)}</p>
            <div class="meta">
              <span>${escapeHtml(paper.authors)}</span>
              <span>${paper.year}</span>
              <span>${escapeHtml(paper.venue)}</span>
              <span>${escapeHtml(paper.institution)}</span>
            </div>
          </div>
          <div class="abstracts">
            <div class="abstract">
              <h3>English Abstract Summary</h3>
              <p>${escapeHtml(paper.en)}</p>
            </div>
            <div class="abstract">
              <h3>中文摘要概述</h3>
              <p>${escapeHtml(paper.cn)}</p>
            </div>
          </div>
          <a class="paper-link" href="${escapeHtml(paper.doi)}" target="_blank" rel="noreferrer">打开论文链接</a>
        </article>
      `).join("");

      emptyState.classList.toggle("is-visible", filtered.length === 0);
      countPill.textContent = `${filtered.length} / ${papers.length} 篇论文`;
    }

    buttons.forEach((button) => {
      button.addEventListener("click", () => {
        activeTopic = button.dataset.topic;
        buttons.forEach((item) => item.classList.toggle("is-active", item === button));
        renderPapers();
      });
    });

    searchInput.addEventListener("input", renderPapers);
    groupSelect.addEventListener("change", renderPapers);
    renderGroupOptions();
    renderPapers();
  </script>
